name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          cache: true

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify release metadata
        shell: pwsh
        run: node scripts/verify-release.mjs $env:GITHUB_REF_NAME

      - name: Install pinned packaging tools
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          choco install nsis --version=3.11 -y --no-progress

      - name: Build and verify release artifacts
        shell: pwsh
        run: .\scripts\build.ps1
        env:
          ENTCOIN_WINDOWS_CERTIFICATE_BASE64: ${{ secrets.ENTCOIN_WINDOWS_CERTIFICATE_BASE64 }}
          ENTCOIN_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.ENTCOIN_WINDOWS_CERTIFICATE_PASSWORD }}
          ENTCOIN_WINDOWS_TIMESTAMP_URL: ${{ vars.ENTCOIN_WINDOWS_TIMESTAMP_URL }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: entcoin-windows-amd64
          if-no-files-found: error
          path: |
            build/bin/Entcoin.exe
            build/bin/entcoin-amd64-installer.exe
            build/bin/entcoin-cli.exe
            build/bin/entcoin-windows-seed-deploy.zip
            build/bin/SHA256SUMS.txt

  linux-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          cache: true

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify release metadata
        run: node scripts/verify-release.mjs "$GITHUB_REF_NAME"

      - name: Install pinned Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build and verify Linux release artifacts
        run: |
          go test -count=1 ./...
          go vet ./...
          ./scripts/build-linux.sh "${GITHUB_REF_NAME#v}"
          cd build/bin
          sha256sum --check SHA256SUMS-linux.txt

      - name: Install package and smoke-test Secret Service wallet
        run: |
          sudo apt-get install -y ./build/bin/entcoin_*_amd64.deb
          dbus-run-session -- ./scripts/smoke-linux-wallet.sh /usr/bin/entcoin-cli /tmp/entcoin-wallet-smoke

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: entcoin-linux-amd64
          if-no-files-found: error
          path: |
            build/bin/entcoin-linux-amd64
            build/bin/entcoin-cli-linux-amd64
            build/bin/entcoin_*_amd64.deb
            build/bin/SHA256SUMS-linux.txt

  publish:
    needs: [windows-build, linux-build]
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: entcoin-*-amd64
          path: release-assets
          merge-multiple: true

      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: release-assets/*

      - uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
