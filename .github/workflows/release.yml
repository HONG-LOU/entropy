name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install pinned packaging tools
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          choco install nsis --version=3.11 -y --no-progress

      - name: Build and verify release artifacts
        shell: pwsh
        run: .\scripts\build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: entropy-windows-amd64
          if-no-files-found: error
          path: |
            build/bin/Entropy.exe
            build/bin/entropy-amd64-installer.exe
            build/bin/entropy-cli.exe
            build/bin/entropy-windows-seed-deploy.zip
            build/bin/SHA256SUMS.txt

  linux-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install pinned Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build and verify Linux release artifacts
        run: |
          go test -count=1 ./...
          go vet ./...
          ./scripts/build-linux.sh "${GITHUB_REF_NAME#v}"
          cd build/bin
          sha256sum --check SHA256SUMS-linux.txt

      - name: Install package and smoke-test Secret Service wallet
        run: |
          sudo apt-get install -y ./build/bin/entropy_*_amd64.deb
          dbus-run-session -- ./scripts/smoke-linux-wallet.sh /usr/bin/entropy-cli /tmp/entropy-wallet-smoke

      - uses: actions/upload-artifact@v4
        with:
          name: entropy-linux-amd64
          if-no-files-found: error
          path: |
            build/bin/entropy-linux-amd64
            build/bin/entropy-cli-linux-amd64
            build/bin/entropy_*_amd64.deb
            build/bin/SHA256SUMS-linux.txt

  publish:
    needs: [windows-build, linux-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: entropy-*-amd64
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
