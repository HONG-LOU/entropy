name: ci

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Test Go packages
        run: go test -count=1 ./...

      - name: Vet Go packages
        run: go vet ./...

      - name: Race-test Go packages
        run: go test -race -count=1 ./...

      - name: Scan reachable Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Build headless node
        run: go build -trimpath ./cmd/entcoin

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Build frontend
        working-directory: frontend
        run: |
          npm test
          npm run build

      - name: Validate Windows seed deployment scripts
        shell: pwsh
        run: |
          $parseErrors = @()
          Get-ChildItem deploy/windows-seed -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            $parseErrors += $errors
          }
          if ($parseErrors.Count -gt 0) {
            throw ($parseErrors | Out-String)
          }
          . ./deploy/windows-seed/seed-config.ps1
          $config = Read-SeedEnvironment ./deploy/windows-seed/seed.env.example
          Assert-SeedEnvironment $config

  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Test and vet Go packages
        run: |
          go test -count=1 ./...
          go vet ./...

      - name: Test frontend
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high
          npm test

      - name: Test website and release mirror contracts
        run: |
          node --test website/tests/site-core.test.mjs
          node scripts/verify-release.mjs

      - name: Read package version
        run: |
          version=$(node -p "require('./frontend/package.json').version")
          echo "ENTCOIN_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build Ubuntu package
        run: ./scripts/build-linux.sh "$ENTCOIN_VERSION"

      - name: Inspect Ubuntu package
        run: |
          dpkg-deb --info "build/bin/entcoin_${ENTCOIN_VERSION}_amd64.deb"
          dpkg-deb --contents "build/bin/entcoin_${ENTCOIN_VERSION}_amd64.deb"
          cd build/bin
          sha256sum --check SHA256SUMS-linux.txt

      - name: Install package and smoke-test Secret Service wallet
        run: |
          sudo apt-get install -y "./build/bin/entcoin_${ENTCOIN_VERSION}_amd64.deb"
          dbus-run-session -- ./scripts/smoke-linux-wallet.sh /usr/bin/entcoin-cli /tmp/entcoin-wallet-smoke
