name: ci

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Test Go packages
        run: go test -count=1 ./...

      - name: Vet Go packages
        run: go vet ./...

      - name: Build headless node
        run: go build -trimpath ./cmd/entropy

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Windows seed deployment scripts
        shell: pwsh
        run: |
          $parseErrors = @()
          Get-ChildItem deploy/windows-seed -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            $parseErrors += $errors
          }
          if ($parseErrors.Count -gt 0) {
            throw ($parseErrors | Out-String)
          }
          . ./deploy/windows-seed/seed-config.ps1
          $config = Read-SeedEnvironment ./deploy/windows-seed/seed.env.example
          Assert-SeedEnvironment $config
