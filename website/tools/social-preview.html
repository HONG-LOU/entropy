<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body {
      color: #f4f7f5;
      background-color: #0b0f12;
      background-image:
        linear-gradient(rgb(120 165 182 / 12%) 1px, transparent 1px),
        linear-gradient(90deg, rgb(120 165 182 / 12%) 1px, transparent 1px);
      background-size: 48px 48px;
      font-family: "Noto Sans", sans-serif;
    }
    .copy { position: absolute; left: 82px; top: 76px; }
    img { width: 94px; height: 94px; }
    h1 { margin: 55px 0 19px 4px; font-size: 62px; line-height: 1; letter-spacing: 0; }
    .tagline { margin: 0 0 38px 4px; font-size: 31px; }
    .meta, .domain { margin-left: 6px; color: #9aa7a3; font: 17px "DejaVu Sans Mono", monospace; }
    .accent { width: 72px; height: 5px; margin: 67px 0 23px 6px; background: #54e6b0; }
    svg { position: absolute; inset: 0; }
  </style>
</head>
<body>
  <svg viewBox="0 0 1200 630" aria-hidden="true">
    <g fill="none" stroke="#54e6b0" stroke-opacity=".38" stroke-width="2">
      <path d="M760 135 925 95 1080 185 1035 340 1110 470 950 500 750 415 850 265 760 135M925 95 850 265 1035 340 950 500M1035 340 1110 470"/>
    </g>
    <g fill="#54e6b0">
      <circle cx="760" cy="135" r="5"/><circle cx="925" cy="95" r="5"/>
      <circle cx="1080" cy="185" r="5"/><circle cx="1035" cy="340" r="5"/>
      <circle cx="1110" cy="470" r="5"/><circle cx="950" cy="500" r="5"/>
      <circle cx="750" cy="415" r="5"/>

    <circle cx="850" cy="265" r="8" fill="#f4f7f5"/>
  </svg>
  <div class="copy">
    <img src="../assets/appicon.png" alt="">

</html>
